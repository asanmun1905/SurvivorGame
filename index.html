<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor Chronicles | Dark Fantasy Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body class="theme-dark-fantasy">
  <!-- Main Menu Screen -->
  <div id="main-menu" class="screen">
    <div class="menu-content">
      <h1 class="game-title">Survivor <span>Chronicles</span></h1>
      <p class="subtitle">Dark Fantasy Edition</p>
      <div class="menu-actions">
        <button id="btn-start" class="menu-btn primary">Start Simulation</button>
        <button id="btn-settings" class="menu-btn secondary">Settings</button>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-modal">
      <header>
        <h2>Game Settings</h2>
        <button id="close-settings" class="close-btn">&times;</button>
      </header>
      <div class="settings-scroll">
        <section>
          <h3>Visual Style</h3>
          <div class="setting-item">
            <label>Theme</label>
            <select id="select-theme">
              <option value="dark-fantasy">Dark Fantasy</option>
              <option value="modern">Modern Premium</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Brightness</label>
            <input type="range" id="input-brightness" min="0.2" max="1.5" step="0.1" value="1">
          </div>
        </section>

        <section>
          <h3>World Configuration</h3>
          <div class="setting-item">
            <label>Board Dimensions</label>
            <div class="input-row">
              <div class="input-field">
                <span>Width</span>
                <input type="number" id="input-ancho" value="60" min="10" max="100">
              </div>
              <div class="input-field">
                <span>Height</span>
                <input type="number" id="input-alto" value="25" min="10" max="50">
              </div>
            </div>
          </div>
          <div class="setting-item">
            <label>Obstacles</label>
            <input type="number" id="input-obstaculos" value="35" min="0" max="200">
          </div>
          <div class="setting-item">
            <label>Population</label>
            <div class="input-row">
              <div class="input-field">
                <span>Enemies</span>
                <input type="number" id="input-enemigos" value="10" min="1" max="50">
              </div>
              <div class="input-field">
                <span>Prey</span>
                <input type="number" id="input-presas" value="15" min="1" max="50">
              </div>
            </div>
          </div>
          <div class="setting-item">
            <label>Simulation Speed</label>
            <input type="range" id="input-velocidad" min="20" max="500" value="100">
            <span id="val-velocidad">100ms</span>
          </div>
        </section>
      </div>
      <footer>
        <button id="save-settings" class="apply-btn">Apply & Restart</button>
      </footer>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <div id="app">
      <header>
        <h1>Survivor <span>Chronicles</span></h1>
        <div class="hud">
          <div class="stat">
            <span class="label">Turno</span>
            <span id="turn-count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Presas</span>
            <span id="presa-count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Enemigos</span>
            <span id="enemigo-count" class="value">0</span>
          </div>
          <button id="menu-back-btn" class="hud-btn">Exit to Menu</button>
        </div>
      </header>

      <main class="game-container">
        <div class="canvas-wrapper">
          <canvas id="game-canvas"></canvas>
          <div id="status-overlay" class="hidden">
            <h2 id="status-text"></h2>
            <div class="overlay-buttons">
              <button id="overlay-restart-btn">Try Again</button>
              <button id="overlay-menu-btn">Exit to Menu</button>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <p>Survivor Chronicles - Dark Fantasy Edition &copy; 2026</p>
      </footer>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
