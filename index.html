<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survivor Web | Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- Decorative background elements -->
    <div class="bg-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div id="app">
      <header>
        <h1>Survivor <span>Web</span></h1>
        <div class="hud">
          <div class="stat">
            <span class="label">Turno</span>
            <span id="turn-count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Presas</span>
            <span id="presa-count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Enemigos</span>
            <span id="enemigo-count" class="value">0</span>
          </div>
        </div>
      </header>
      
      <div class="game-layout">
        <aside class="settings-panel">
          <h3>Configuración</h3>
          
          <div class="setting-group">
            <label for="input-ancho">Ancho Tablero</label>
            <input type="number" id="input-ancho" value="60" min="10" max="100">
          </div>
          
          <div class="setting-group">
            <label for="input-alto">Alto Tablero</label>
            <input type="number" id="input-alto" value="25" min="10" max="50">
          </div>

          <hr>

          <div class="setting-group">
            <label for="input-obstaculos">Obstáculos</label>
            <input type="number" id="input-obstaculos" value="35" min="0" max="200">
          </div>

          <div class="setting-group">
            <label for="input-enemigos">Enemigos</label>
            <input type="number" id="input-enemigos" value="10" min="1" max="50">
          </div>

          <div class="setting-group">
            <label for="input-presas">Presas</label>
            <input type="number" id="input-presas" value="15" min="1" max="50">
          </div>

          <hr>

          <div class="setting-group">
            <label for="input-velocidad">Velocidad (ms)</label>
            <input type="range" id="input-velocidad" min="20" max="500" value="100">
            <span id="val-velocidad">100ms</span>
          </div>

          <button id="restart-btn" class="primary-btn">Reiniciar Partida</button>
        </aside>

        <main class="game-container">
          <div class="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
            <div id="status-overlay" class="hidden">
              <h2 id="status-text"></h2>
              <button id="overlay-restart-btn">Nueva Partida</button>
            </div>
          </div>
        </main>
      </div>

      <footer>
        <p>Survivor Optimized - Premium Custom Edition &copy; 2026</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
